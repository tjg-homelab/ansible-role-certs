---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    # Generate a throwaway self-signed cert/key on the CONTROL NODE (never
    # committed — keeps real-looking PEM out of the repo and past gitleaks).
    # controller_fixture mode then distributes these to the containers.
    - name: Generate a throwaway self-signed cert/key on the controller
      delegate_to: localhost
      run_once: true
      ansible.builtin.command:
        cmd: >-
          openssl req -x509 -newkey rsa:2048 -nodes
          -keyout {{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/privkey.pem
          -out {{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/fullchain.pem
          -days 1 -subj "/CN=molecule.test"
        creates: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/fullchain.pem"
