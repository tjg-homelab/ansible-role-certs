---
name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan full history for secrets
        run: >-
          docker run --rm -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:latest
          git /repo --no-banner

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tooling
        run: pip install ansible-core ansible-lint yamllint
      - name: yamllint
        run: yamllint .
      - name: ansible-lint
        run: ansible-lint

  molecule:
    name: Molecule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install molecule
        run: pip install ansible-core molecule molecule-plugins[docker] docker
      - name: Install required collections
        run: ansible-galaxy collection install community.docker ansible.posix
      - name: Run molecule test
        run: molecule test
        env:
          ANSIBLE_FORCE_COLOR: "1"
          PY_COLORS: "1"
